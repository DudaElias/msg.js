phrase_rounds:
  - word: "Casa"
    clues:
      - player: 1
        type: phrase
        content: "Lar, doce lar"
      - player: 2
        type: phrase
        content: "Na rua dos bobos, número 0!"
      - player: 3
        type: phrase
        content: "Todo mundo precisa de um lugar para voltar"

  - word: "Filosofia"
    clues:
      - player: 1
        type: phrase
        content: "Só sei que nada sei"
      - player: 2
        type: phrase
        content: "Penso, logo existo"
      - player: 3
        type: phrase
        content: "Os sábios falam porque têm algo a dizer, os tolos porque precisam dizer algo"

  - word: "Fogo"
    clues:
      - player: 1
        type: phrase
        content: "Onde há fumaça, ..."
      - player: 2
        type: phrase
        content: "Alguém chama o bombeiro!"
      - player: 3
        type: phrase
        content: "Cuidado pra não se queimar"

  - word: "Brasil"
    clues:
      - player: 1
        type: phrase
        content: "Ouviram do Ipiranga às margens plácidas"
      - player: 2
        type: phrase
        content: "Moro num país tropical, abençoado por Deus e bonito por natureza"
      - player: 3
        type: phrase
        content: "A amazônia é o pulmão do mundo!"

  - word: "Sol"
    clues:
      - player: 1
        type: phrase
        content: "Depois da chuva..."
      - player: 2
        type: phrase
        content: "Usem protetor solar"
      - player: 3
        type: phrase
        content: "Nasce todos os dias e ninguém aplaude"

  - word: "Água"
    clues:
      - player: 1
        type: phrase
        content: "... tanto bate até que fura"
      - player: 2
        type: phrase
        content: "Ele foi com muita sede ao pote"
      - player: 3
        type: phrase
        content: "Os oceanos cobrem cerca de 70% da superfície terrestre."

  - word: "Tempo"
    clues:
      - player: 1
        type: phrase
        content: "E o relógio vai: tic tac tic tac..."
      - player: 2
        type: phrase
        content: "Rola a bola! Restam mais 45 minutos para o Brasil empatar o jogo!"
      - player: 3
        type: phrase
        content: "O ontem é história, o amanhã, um mistério. Mas o hoje, é uma dádiva. É por isso que se chama presente."

